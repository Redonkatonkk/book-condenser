<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>书籍浓缩器</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>书籍浓缩器</h1>
          <p id="subtitle">EPUB / PDF / TXT → 浓缩 EPUB</p>
        </div>
        <div class="top-actions">
          <button id="workspaceBtn" class="secondary hidden" type="button">浓缩页面</button>
          <button id="libraryBtn" class="secondary hidden" type="button">个人页面</button>
          <a id="downloadBtn" class="download hidden" href="#" download>下载 EPUB</a>
          <button id="loginOpenBtn" type="button">登录</button>
          <div id="userBadge" class="user-badge hidden">
            <span id="userEmail"></span>
            <button id="logoutBtn" class="secondary" type="button">退出</button>
          </div>
        </div>
      </header>

      <p id="globalError" class="error global-error hidden"></p>

      <section id="authPanel" class="auth-panel hidden">
        <form id="loginForm" class="auth-card">
          <h2>登录</h2>
          <label class="field">
            <span>Email</span>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span>密码</span>
            <input
              id="loginPassword"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <button type="submit">登录</button>
          <div id="accountCreatePrompt" class="account-create-prompt hidden">
            <span>查询不到该账号，是否创建账号？</span>
            <button id="createMissingAccountBtn" type="button">是，创建并登录</button>
            <button id="cancelCreateAccountBtn" class="secondary" type="button">取消</button>
          </div>
        </form>
      </section>

      <section id="libraryView" class="library-view hidden">
        <form id="libraryUploadForm" class="upload-panel library-upload-panel">
          <label class="file-drop" for="libraryFileInput">
            <span id="libraryFileName">选择书籍文件</span>
            <input id="libraryFileInput" name="file" type="file" accept=".epub,.pdf,.txt" required />
          </label>

          <label class="field">
            <span>MiniMax 模型</span>
            <select id="libraryModelSelect" name="model"></select>
          </label>

          <label id="libraryRegionField" class="field">
            <span>服务区</span>
            <select id="libraryRegionSelect" name="region"></select>
          </label>

          <label id="libraryApiKeyField" class="field hidden">
            <span>MiniMax API Key</span>
            <input
              id="libraryApiKeyInput"
              name="api_key"
              type="password"
              autocomplete="off"
              placeholder="保存个人 Key 或本次填写"
            />
          </label>

          <button id="libraryStartBtn" type="submit">上传并分析</button>
        </form>

        <section class="account-panel">
          <div>
            <span class="metric-label">账户</span>
            <strong id="accountEmail">-</strong>
          </div>
          <form id="accountKeyForm" class="account-key-form">
            <label class="field">
              <span>个人 MiniMax API Key</span>
              <input
                id="accountApiKeyInput"
                name="api_key"
                type="password"
                autocomplete="off"
                placeholder="留空不改变"
              />
            </label>
            <label class="field">
              <span>服务区</span>
              <select id="accountRegionSelect" name="region"></select>
            </label>
            <button type="submit">保存 Key</button>
            <button id="clearAccountKeyBtn" class="secondary" type="button">清除 Key</button>
          </form>
          <span id="accountKeyStatus" class="key-status">-</span>
        </section>

        <section class="library-panel">
          <div class="panel-head">
            <h2>我的书籍</h2>
            <button id="refreshLibraryBtn" class="secondary" type="button">刷新</button>
          </div>
          <div id="libraryEmpty" class="empty hidden">暂无书籍</div>
          <table id="libraryTable">
            <thead>
              <tr>
                <th>书籍</th>
                <th>状态</th>
                <th>进度</th>
                <th>章节</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="libraryRows"></tbody>
          </table>
        </section>
      </section>

      <section id="uploadView" class="workspace">
        <form id="uploadForm" class="upload-panel">
          <label class="file-drop" for="fileInput">
            <span id="fileName">选择书籍文件</span>
            <input id="fileInput" name="file" type="file" accept=".epub,.pdf,.txt" required />
          </label>

          <label class="field">
            <span>MiniMax 模型</span>
            <select id="modelSelect" name="model"></select>
          </label>

          <label id="regionField" class="field">
            <span>服务区</span>
            <select id="regionSelect" name="region"></select>
          </label>

          <label id="apiKeyField" class="field hidden">
            <span>MiniMax API Key</span>
            <input
              id="apiKeyInput"
              name="api_key"
              type="password"
              autocomplete="off"
              placeholder="后台未配置，请填写"
            />
          </label>

          <button id="startBtn" type="submit">上传并分析</button>
        </form>

        <section id="analysisPanel" class="analysis-panel hidden">
          <div>
            <span class="metric-label">书名</span>
            <strong id="bookTitle">-</strong>
          </div>
          <div>
            <span class="metric-label">章节</span>
            <strong id="chapterCount">-</strong>
          </div>
          <div>
            <span class="metric-label">原文字数</span>
            <strong id="totalCount">-</strong>
          </div>
          <div>
            <span class="metric-label">完整性</span>
            <strong id="integrityState">-</strong>
          </div>
        </section>

        <section id="progressPanel" class="progress-panel hidden">
          <div class="progress-head">
            <strong id="statusText">等待任务</strong>
            <span id="progressText">0%</span>
          </div>
          <div class="bar" aria-label="总进度">
            <div id="progressFill"></div>
          </div>
          <div class="progress-foot">
            <span id="etaText">-</span>
            <span id="elapsedText">-</span>
          </div>
          <p id="errorText" class="error hidden"></p>
        </section>

        <section id="actionPanel" class="action-panel hidden">
          <div class="action-row">
            <button id="condenseOneBtn" type="button">浓缩 1 章</button>
            <button id="condenseTenBtn" type="button">浓缩 10 章</button>
            <button id="condenseAllBtn" type="button">浓缩全部</button>
            <button id="condenseSelectedBtn" type="button">浓缩选中</button>
            <button id="stopCondenseBtn" class="danger" type="button" disabled>停止任务</button>
            <button id="retryFailedBtn" type="button">重试失败</button>
            <button id="exportSelectedBtn" type="button">导出选中</button>
            <button id="exportDoneBtn" type="button">导出已完成</button>
          </div>
          <p id="actionSummary">-</p>
        </section>

        <section id="chapterPanel" class="chapter-panel hidden">
          <table>
            <thead>
              <tr>
                <th class="select-col"><input id="selectAllChapters" type="checkbox" /></th>
                <th>章节</th>
                <th>原字数</th>
                <th>状态</th>
                <th>浓缩后</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="chapterRows"></tbody>
          </table>
        </section>
      </section>

      <section id="previewView" class="preview-view hidden">
        <article class="preview-doc original-doc">
          <div class="preview-head">
            <h2 id="previewOriginalTitle">原始章节</h2>
            <span id="originalCountText">-</span>
          </div>
          <div id="originalContent" class="chapter-content"></div>
        </article>
        <article class="preview-doc condensed-doc">
          <div class="preview-head">
            <h2 id="previewTitle">浓缩章节</h2>
            <span id="condensedCountText">-</span>
          </div>
          <div id="previewContent" class="chapter-content"></div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
